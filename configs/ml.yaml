# 机器学习配置
random_forest:
  n_estimators: 200
  max_depth: null
  n_jobs: -1
  random_state: 42

svm:
  C: 1.0
  kernel: rbf
  probability: true

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  n_jobs: -1
  random_state: 42

# 手工特征配置
features:
  time_domain: [mean, std, min, max, range, rms, skewness, kurtosis, zero_crossing_rate]
  freq_domain: [spectral_mean, spectral_std, dominant_freq, spectral_entropy]
