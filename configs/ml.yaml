# 机器学习配置
random_forest:
  n_estimators: 200
  max_depth: null
  n_jobs: -1
  random_state: 42

svm:
  C: 1.0
  kernel: rbf
  probability: true

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  n_jobs: -1
  random_state: 42

lightgbm:
  n_estimators: 300
  max_depth: -1       # -1 表示不限制，由 num_leaves 控制
  num_leaves: 63
  learning_rate: 0.05
  n_jobs: -1
  random_state: 42

catboost:
  iterations: 300
  depth: 6
  learning_rate: 0.05
  random_state: 42

# 手工特征配置
features:
  time_domain: [mean, std, min, max, range, rms, skewness, kurtosis, zero_crossing_rate]
  freq_domain: [spectral_mean, spectral_std, dominant_freq, spectral_entropy]
