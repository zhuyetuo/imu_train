# 数据配置
raw_dir: data/raw
processed_dir: data/processed

# 原始采样率
source_hz: 100

# 目标采样率列表（从 source_hz 降采样，只支持整除关系）
# 注意: 若设备直接以 15/16/20Hz 录制，将 custom.source_hz 设为实际采样率，无需降采样
target_hz_list: [5, 10, 15, 16, 20, 25, 50]

# 窗口配置（时间固定，点数随hz自动计算）
window_seconds: 2.0
stride_seconds: 1.0

# 只使用项圈传感器的列（collar）
sensor_position: collar

# 数据集A 保留的行为类别
keep_labels:
  - Standing
  - Walking
  - Trotting
  - Sitting
  - Lying chest
  - Sniffing

# 数据集B 保留的行为类别（标签为小写）
keep_labels_b:
  - standing
  - walking
  - sitting
  - lying down

# 自采数据集配置
custom:
  # CSV 文件路径
  csv_path: data/raw_custom/data.csv
  # 采样率 — 填写设备实际采样率，不是目标采样率
  # WitMotion 可在 PC 端软件调整，常用值: 10 / 20 / 50 Hz
  source_hz: 20
  # 狗ID列名
  dog_id_col: dog_id
  # 标签列名
  label_col: label
  # 6个传感器通道列名（顺序：acc_x/y/z, gyr_x/y/z）
  sensor_cols:
    - acc_x
    - acc_y
    - acc_z
    - gyr_x
    - gyr_y
    - gyr_z
  # 保留的行为类别（留空则保留所有标签）
  keep_labels:
    - 活动
    - 睡觉
    - 抓挠

# ── 猫咪数据集配置 ────────────────────────────────────────────────────────────
# 注意: 猫咪数据集通常只有加速度计（3通道），无陀螺仪
# 下载后需用 src/data/convert_cat_rdata.py 将 .RDATA 转为 CSV

# Smit et al. 2023 (Sensors) — 12只猫，24类行为
# FigShare: https://figshare.com/articles/dataset/23605842
# 原始为 R dataframe，需先运行 convert_cat_rdata.py
cat_smit2023:
  csv_path: data/raw_cat_smit2023/cat_smit2023.csv
  # 数据已聚合为 1 秒 epoch（X/Y/Z 均值），source_hz=1
  # 需先运行: Rscript src/data/convert_smit2023.R
  source_hz: 1
  cat_id_col: cat_id
  label_col: behavior
  sensor_cols:
    - acc_x
    - acc_y
    - acc_z
  keep_labels: []

# Dunford et al. 2024 (Ecology and Evolution) — 9只猫，40Hz 原始时间序列
# Dryad: https://datadryad.org/dataset/doi:10.5061/dryad.q2bvq83sx
# ⭐ 推荐优先使用：有原始 40Hz 时序数据，与本项目管线最兼容
cat_dunford2024:
  csv_path: data/raw_cat_dunford2024/Dunford_et_al._Cats_calibrated_data.csv
  source_hz: 40
  cat_id_col: ID
  label_col: Behaviour
  sensor_cols:
    - AccX
    - AccY
    - AccZ
  keep_labels: []

# Smit et al. 2024 (PMC，家庭环境) — 28只猫，8类行为
# FigShare: https://figshare.com/articles/dataset/24848292
cat_smit2024:
  csv_path: data/raw_cat_smit2024/cat_smit2024.csv
  source_hz: 25
  cat_id_col: cat_id
  label_col: behavior
  sensor_cols:
    - acc_x
    - acc_y
    - acc_z
  keep_labels:
    - active
    - eating
    - grooming
    - littering
    - lying
    - scratching
    - sitting
    - standing

# 训练/验证/测试按狗ID划分（leave-some-dogs-out）
# 45只狗，建议 36/5/4 split
train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1

# 随机种子
seed: 42
