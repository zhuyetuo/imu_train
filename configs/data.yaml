# 数据配置
raw_dir: data/raw
processed_dir: data/processed

# 原始采样率
source_hz: 100

# 目标采样率列表（从100Hz降采样）
target_hz_list: [5, 10, 25, 50]

# 窗口配置（时间固定，点数随hz自动计算）
window_seconds: 2.0
stride_seconds: 1.0

# 只使用项圈传感器的列（collar）
sensor_position: collar

# 数据集A 保留的行为类别
keep_labels:
  - Standing
  - Walking
  - Trotting
  - Sitting
  - Lying chest
  - Sniffing

# 数据集B 保留的行为类别（标签为小写）
keep_labels_b:
  - standing
  - walking
  - sitting
  - lying down
  - body shake

# 自采数据集配置
custom:
  # CSV 文件路径
  csv_path: data/raw_custom/data.csv
  # 采样率（根据你的传感器实际采样率填写）
  source_hz: 100
  # 狗ID列名
  dog_id_col: dog_id
  # 标签列名
  label_col: label
  # 6个传感器通道列名（顺序：acc_x/y/z, gyr_x/y/z）
  sensor_cols:
    - acc_x
    - acc_y
    - acc_z
    - gyr_x
    - gyr_y
    - gyr_z
  # 保留的行为类别（填写你实际标注的标签名）
  keep_labels: []   # 留空则保留所有标签

# 训练/验证/测试按狗ID划分（leave-some-dogs-out）
# 45只狗，建议 36/5/4 split
train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1

# 随机种子
seed: 42
